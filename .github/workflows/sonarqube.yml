name: SonarQube

# Submit analysis to SonarQube on every PR targeting main and on every push to
# main. PR runs let SonarQube decorate the PR / evaluate the new-code quality
# gate; main runs keep the project's overall measures current.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One Sonar run per ref; newer events cancel older in-progress runs.
concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  sonarqube:
    name: sonarqube
    runs-on: ubuntu-22.04
    # Repository secrets (SONAR_TOKEN / SONAR_HOST_URL / SONAR_PROJECT_KEY) are
    # NOT exposed to pull_request runs from forks, so the scanner gets an empty
    # host URL and fails. Run only when secrets are actually available: pushes to
    # main, and PRs from branches within this repo (maintainers). Fork PRs skip
    # Sonar — they're still covered by the ci.yml gate.
    #
    # `[Meta]` changes (repo-metadata-only) skip Sonar too: a PR whose title
    # starts with `[Meta]`, or a push whose head-commit message starts with it.
    if: >-
      (github.event_name == 'push' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      !(
        (github.event_name == 'pull_request' &&
         startsWith(github.event.pull_request.title, '[Meta]')) ||
        (github.event_name == 'push' &&
         startsWith(github.event.head_commit.message, '[Meta]'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar needs full history for accurate new-code detection and blame.
          fetch-depth: 0

      # The workspace includes the Tauri GUI crate, which links GTK/WebKit/etc.,
      # so building it for coverage needs the -dev packages (same set as ci.yml).
      - name: Install Linux GUI build deps
        uses: ./.github/actions/install-gui-deps

      # Toolchain comes from rust-toolchain.toml (1.96.0); cargo-llvm-cov also
      # needs the llvm-tools-preview component.
      - name: Add llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Rust coverage (lcov)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
