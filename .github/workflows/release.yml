name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # finals,    e.g. v2.0.2
      - "v[0-9]+.[0-9]+.[0-9]+-*" # prereleases, e.g. v2.0.2-rc.1

# Every job may need to read/write releases; set it once at the top.
permissions:
  contents: write

# Never cancel a release mid-flight (a re-pushed tag must not orphan a publish).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fail fast if the tag doesn't match the committed manifest versions, and emit
  # the v-stripped version for the reusable build (arch pkgver). Because `check`
  # already asserts tag == manifests, this value equals the manifest version.
  check:
    name: version-check
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      # Only runs xtask version-check (reads manifests); no authenticated git op.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Assert tag == manifests
        run: cargo run -p xtask -- version-check "${GITHUB_REF_NAME}"
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # Build every shipped artifact (GUI bundles + Arch package) via the reusable
  # build workflow's target matrix. `version` comes from `check` (the v-stripped
  # tag, which it already asserted equals the manifests), so the Arch pkgver is
  # unchanged. Release always builds the full set.
  build:
    needs: check
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.check.outputs.version }}
      targets: >-
        [
          {"id":"linux-x86_64","runner":"ubuntu-22.04","container":"","kind":"gui"},
          {"id":"linux-arm64","runner":"ubuntu-22.04-arm","container":"","kind":"gui"},
          {"id":"macos","runner":"macos-14","container":"","kind":"gui"},
          {"id":"arch-x86_64","runner":"ubuntu-22.04","container":"archlinux:base-devel","kind":"arch"},
          {"id":"fedora-x86_64","runner":"ubuntu-22.04","container":"","kind":"fedora"},
          {"id":"fedora-arm64","runner":"ubuntu-22.04-arm","container":"","kind":"fedora"}
        ]
    secrets: inherit

  # Real-Fedora validation of the freshly-built .rpm — the ONLY place its `depends`
  # names and %post scriptlet run on an actual rpm stack (the bundler itself runs on
  # Ubuntu). Blocking: `publish` needs it, so a broken rpm can't ship. x86_64 only;
  # both arches share one depends list + one %post, so this still catches a typo'd
  # dependency name or a broken scriptlet.
  smoke:
    name: fedora-smoke
    needs: build
    runs-on: ubuntu-22.04
    # Pinned to a fixed Fedora release (not the mutable `latest`) so a release run
    # always validates against the same rpm environment. Bump deliberately; tighten
    # to an `@sha256:` digest if fully-reproducible smoke runs are needed.
    container: fedora:42
    steps:
      # findutils isn't in the minimal fedora image; dnf is. Install it before the
      # `find` below (libcap/getcap arrive as an rpm dependency of the package).
      - name: Install smoke prereqs
        run: dnf -y install findutils
      - name: Download the fedora x86_64 build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-fedora-x86_64
          path: rpm
      - name: dnf install + assert pkg-format
        run: |
          set -euo pipefail
          pkg=$(find rpm -name '*.rpm' | head -n1)
          [ -n "$pkg" ] || { echo "::error::no .rpm in the fedora artifact"; exit 1; }
          # Proves every Requires resolves against Fedora repos, and runs %post.
          dnf install -y "$pkg"
          # Blocking: the shipped daemon must self-update via rpm.
          fmt=$(yerdd --pkg-format)
          [ "$fmt" = "rpm" ] \
            || { echo "::error::installed yerdd --pkg-format=$fmt (expected rpm)"; exit 1; }
          # Advisory: file caps often can't persist on a container's overlayfs.
          getcap /usr/bin/yerdd | grep -q cap_net_bind_service \
            || echo "::warning::setcap did not persist in the container (expected on overlayfs)"
          echo "Fedora smoke OK: $pkg installs, deps resolve, pkg-format=rpm"

  # The ONLY job that touches the release. Assemble everything, create it as a
  # hidden draft with all files + checksums attached, then flip it public —
  # so nobody can ever see a release missing its artifacts.
  publish:
    name: publish
    needs: [build, smoke]
    runs-on: ubuntu-22.04
    # Checkout is needed so the trust-anchor gate can read the embedded
    # UPDATE_PUBLIC_KEY from source at the tagged commit. GH_REPO is kept explicit
    # for gh (harmless once a checkout is present).
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      # Read-only checkout (the trust-anchor gate just reads source); no later
      # step does any git operation and release auth is GH_TOKEN, so don't leave
      # the checkout token persisted in .git/config.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # upload-artifact preserves each file's source path, so the GUI bundles
      # (target/release/bundle/) arrive nested. Flatten to the dist root so
      # `dist/*` and the maxdepth-1 SHA256SUMS find catch them all.
      - name: Flatten + rename downloaded artifacts
        working-directory: dist
        run: |
          set -euo pipefail
          find . -mindepth 2 -type f \
            \( -name '*.deb' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.pkg.tar.zst' -o -name '*.rpm' \) \
            -exec mv -t . {} +
          # Drop the now-redundant nested dirs so `dist/*` is files-only.
          find . -mindepth 1 -type d -exec rm -rf {} +
          # Human-friendly release asset names:
          #   Yerd_<OS>_<Arch>_v<version>.<ext>   (e.g. Yerd_MacOS_AppleSilicon_v2-0-2-rc-3.dmg)
          # Tauri emits Yerd_<ver>_<arch>.deb (the macOS .dmg is built by
          # scripts/build-macos-dmg.sh, matching the same naming); the .app.tar.gz is already
          # Yerd_MacOS_AppleSilicon.app.tar.gz; the arch job emits
          # Yerd_<ver>_x86_64.pkg.tar.zst. We relabel OS+arch and dash the version
          # (dots → dashes) so the Releases page reads cleanly.
          ver="v$(printf '%s' "${GITHUB_REF_NAME#v}" | tr '.' '-')"
          for f in Yerd_* yerd-gui_* yerd_*; do
            [ -e "$f" ] || continue
            # Compound extensions first (`.app.tar.gz`/`.pkg.tar.zst` would
            # otherwise collapse to `gz`/`zst`).
            case "$f" in
              *.app.tar.gz)  ext="app.tar.gz";  os="MacOS" ;;
              *.pkg.tar.zst) ext="pkg.tar.zst"; os="Linux" ;;
              *.dmg)         ext="dmg";         os="MacOS" ;;
              *.deb)         ext="deb";         os="Linux" ;;
              *.rpm)         ext="rpm";         os="Linux" ;;
              *) continue ;;
            esac
            case "$f" in
              *AppleSilicon*|*aarch64*|*arm64*) [ "$os" = "MacOS" ] && arch="AppleSilicon" || arch="Arm64" ;;
              *x86_64*|*amd64*)  arch="x86_64" ;;
              *) arch="unknown" ;;
            esac
            mv -- "$f" "Yerd_${os}_${arch}_${ver}.${ext}"
          done
          echo "Release artifacts:" && ls -1

      # Detached minisign signatures over the final-named update artifacts, which
      # the daemon verifies before applying (against the key embedded in
      # `yerd_update::UPDATE_PUBLIC_KEY`). `-H` = prehashed, which `minisign-verify`
      # requires. PRECONDITION: provision `MINISIGN_SECRET_KEY` (generate an
      # *unencrypted* key with `minisign -G -W` to avoid a CI password prompt) and
      # set `UPDATE_PUBLIC_KEY` to its public half before this is load-bearing.
      #
      # The published signature is named `<artifact>.minisig`, not `<artifact>.sig`:
      # pacman reserves `<pkg>.sig` for a detached OpenPGP signature, so a minisign
      # file under that name makes `pacman -U` hard-fail even at the default
      # `LocalFileSigLevel = Optional` (#157). For the NON-pacman kinds we also
      # publish a byte-identical legacy `<artifact>.sig` copy so self-updaters
      # shipped at v2.0.3 or earlier keep working; a detached minisign signature
      # verifies the artifact bytes regardless of the sibling filename. That legacy
      # copy is a bounded transition measure, to be retired once those clients have
      # moved on; the pacman `.sig` is never re-published (see the guard below).
      - name: Sign update artifacts (minisign)
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          # Repo variable to close the legacy `.sig` transition window (see below).
          RETIRE_LEGACY_SIG: ${{ vars.RETIRE_LEGACY_SIG }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — cannot sign the release"
            exit 1
          fi
          # `minisign` isn't in the runner's apt repos, so install the official
          # prebuilt static binary from the canonical (pinned) release over HTTPS.
          MINISIGN_VERSION=0.11
          curl -sSfL "https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          MINISIGN_BIN=$(find "$RUNNER_TEMP/minisign-linux" -path '*x86_64*' -name minisign | head -n1)
          [ -n "$MINISIGN_BIN" ] || { echo "::error::minisign x86_64 binary not found in release tarball"; exit 1; }
          sudo install -m0755 "$MINISIGN_BIN" /usr/local/bin/minisign
          command -v minisign
          # Wipe the key on ANY exit (incl. a mid-loop failure), not just success.
          trap 'rm -f "$RUNNER_TEMP/minisign.key"' EXIT
          umask 077; printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          shopt -s nullglob
          for f in *.app.tar.gz *.deb *.pkg.tar.zst *.rpm; do
            minisign -S -H -s "$RUNNER_TEMP/minisign.key" -m "$f" -x "$f.minisig"
            echo "signed $f -> $f.minisig"
          done
          # Legacy `.sig` copies for the non-pacman kinds only (bounded transition
          # window). NEVER copy for *.pkg.tar.zst: a pacman `.sig` re-creates #157.
          # Closing the window is a deliberate, CI-controlled cutoff: set the repo
          # variable RETIRE_LEGACY_SIG=true and no `.sig` is published thereafter.
          # Default (unset) keeps the copies shipping through the transition.
          if [ "${RETIRE_LEGACY_SIG:-}" = "true" ]; then
            echo "RETIRE_LEGACY_SIG=true: transition window closed, publishing no legacy .sig copies"
          else
            for f in *.app.tar.gz *.deb *.rpm; do
              cp -- "$f.minisig" "$f.sig"
              echo "legacy copy $f.minisig -> $f.sig"
            done
          fi

      # Trust-anchor gate: prove the public key the daemon EMBEDS
      # (`yerd_update::UPDATE_PUBLIC_KEY`) actually verifies these signatures — so
      # a real release can never ship signatures the shipped binary can't check
      # (catches both the placeholder key being left in and a CI secret mismatch).
      - name: Verify signatures against the embedded public key
        working-directory: dist
        run: |
          set -euo pipefail
          ART="$GITHUB_WORKSPACE/crates/yerd-update/src/artifact.rs"
          KEY=$(grep -oE 'UPDATE_PUBLIC_KEY: &str = "[^"]+"' "$ART" | sed -E 's/.*"([^"]+)".*/\1/')
          [ -n "$KEY" ] || { echo "::error::could not read UPDATE_PUBLIC_KEY from $ART"; exit 1; }
          # Refuse to ship the published minisign-verify test key.
          TEST_KEY="RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3"
          if [ "$KEY" = "$TEST_KEY" ]; then
            echo "::error::UPDATE_PUBLIC_KEY is still the placeholder test key — wire the production key before releasing"
            exit 1
          fi
          shopt -s nullglob
          for f in *.app.tar.gz *.deb *.pkg.tar.zst *.rpm; do
            minisign -V -H -P "$KEY" -m "$f" -x "$f.minisig" \
              || { echo "::error::embedded UPDATE_PUBLIC_KEY does not verify $f.minisig (key/secret mismatch)"; exit 1; }
            echo "verified $f against embedded key"
          done
          # Also verify every legacy `.sig` copy against the same key, so a botched
          # transition-window byte copy can't ship unverified.
          for s in *.sig; do
            minisign -V -H -P "$KEY" -m "${s%.sig}" -x "$s" \
              || { echo "::error::embedded UPDATE_PUBLIC_KEY does not verify legacy $s (key/secret mismatch)"; exit 1; }
            echo "verified legacy $s against embedded key"
          done
          # Regression guard for #157: a pacman `.sig` must never ship. pacman would
          # mistake it for an OpenPGP signature and hard-fail `pacman -U`.
          if compgen -G '*.pkg.tar.zst.sig' > /dev/null; then
            echo "::error::refusing to publish: a *.pkg.tar.zst.sig exists in dist/ (re-creates #157)"
            exit 1
          fi

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          find . -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.pkg.tar.zst' -o -name '*.rpm' \) \
            -printf '%P\n' | sort | xargs -r sha256sum > SHA256SUMS
          echo "Artifacts:" && cat SHA256SUMS

      # A stable release's notes must span the whole cycle since the previous
      # STABLE release, not just since the last rc. Left to itself, GitHub's
      # generate-notes picks the nearest preceding tag by semver, which is the
      # trailing `-rc.N` prerelease, so the stable notes would omit everything
      # that landed across the rc cycle. Pin `previous_tag_name` to the previous
      # stable tag (vX.Y.Z with no prerelease suffix). Prereleases keep GitHub's
      # default baseline (this step is skipped, leaving the output empty).
      - name: Determine previous stable tag
        id: prevtag
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          set -euo pipefail
          current="${GITHUB_REF_NAME}"
          # A transient tag-list fetch failure must not abort the publish job:
          # tolerate it and fall back to GitHub's default baseline (empty output).
          tags=$(gh api --paginate "repos/${GH_REPO}/tags" --jq '.[].name' || true)
          prev=$(
            {
              printf '%s\n' "$tags"
              printf '%s\n' "$current"
            } \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V -u \
              | grep -B1 -Fx -- "$current" \
              | head -n1
          ) || prev=""
          if [ -z "$prev" ] || [ "$prev" = "$current" ]; then
            echo "No previous stable tag before ${current}; using GitHub's default baseline."
            prev=""
          else
            echo "Release notes baseline for ${current}: ${prev}"
          fi
          echo "previous_tag=${prev}" >> "$GITHUB_OUTPUT"

      - name: Create draft release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          previous_tag: ${{ steps.prevtag.outputs.previous_tag }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: dist/*

      # Regroup GitHub's auto-generated notes (What's Changed) into
      # Features / Fixes / Others by PR-title prefix, WHILE the release is still a
      # hidden draft, so it goes public already formatted. GH_TOKEN/GH_REPO come
      # from the job env. The prefix convention is enforced on PRs by pr-title.yml.
      - name: Group release notes by prefix
        run: |
          set -euo pipefail
          RAW_NOTES=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body)
          NOTES=$(printf '%s' "$RAW_NOTES" | bash .github/scripts/group-release-notes.sh)
          gh release edit "${GITHUB_REF_NAME}" --notes "$NOTES"

      - name: Publish (flip draft -> public)
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          fi

      # Announce the now-public release to Discord. Best-effort: a missing webhook
      # or a failed POST must never fail the release, hence continue-on-error + the
      # explicit guard. Prerelease (tag has a '-') switches the embed colour/footer
      # to the pre-release channel styling.
      - name: Notify Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PRERELEASE: ${{ contains(github.ref_name, '-') }}
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping Discord notification"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME}"
          # Drop the "by @author in <PR-url>" suffixes GitHub appends; cleaner in Discord.
          NOTES=$(gh release view "$TAG" --json body --jq .body \
            | sed -E 's# by @[A-Za-z0-9_-]+ in https://github\.com/[^ ]+/pull/[0-9]+##g')
          # Discord embed descriptions cap at 4096; stay well under with a margin.
          if [[ ${#NOTES} -gt 3800 ]]; then
            NOTES="${NOTES:0:3800}…"
          fi
          URL="https://github.com/${GH_REPO}/releases/tag/${TAG}"
          if [[ "$PRERELEASE" == "true" ]]; then
            FOOTER="Pre-release channel"
            COLOR=15844367
          else
            FOOTER="Stable channel"
            COLOR=3066993
          fi
          PAYLOAD=$(jq -n \
            --arg title "Yerd ${TAG} released" \
            --arg url "$URL" \
            --arg notes "$NOTES" \
            --arg footer "$FOOTER" \
            --argjson color "$COLOR" \
            '{
              username: "Yerd Releases",
              embeds: [{
                title: $title,
                url: $url,
                description: $notes,
                color: $color,
                footer: { text: $footer },
                timestamp: (now | todate)
              }]
            }')
          if ! curl -fsSL --connect-timeout 10 --max-time 30 \
            -H "Content-Type: application/json" \
            -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"; then
            echo "Discord notification failed; release succeeded regardless"
          fi
