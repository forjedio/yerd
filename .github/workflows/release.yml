name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # finals,    e.g. v2.0.2
      - "v[0-9]+.[0-9]+.[0-9]+-*" # prereleases, e.g. v2.0.2-rc.1

# Every job may need to read/write releases; set it once at the top.
permissions:
  contents: write

# Never cancel a release mid-flight (a re-pushed tag must not orphan a publish).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fail fast if the tag doesn't match the committed manifest versions.
  check:
    name: version-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag == manifests
        run: cargo run -p xtask -- version-check "${GITHUB_REF_NAME}"

  # Build the GUI bundles (.deb on Linux, per-arch .dmg on macOS) — the ONLY
  # shipped artifact. The daemon + CLI + helper are embedded in the bundle
  # (Tauri externalBin); there is no standalone CLI tarball/.deb.
  # We build directly (no release-uploading action) and store the bundles as
  # workflow artifacts; the single publish job attaches everything.
  gui:
    name: gui (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/yerd-gui
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI build deps
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libdbus-1-dev libxdo-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/yerd-gui/package-lock.json
      - uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      # macOS: import the Developer ID cert into an ephemeral keychain and stage
      # the App Store Connect API key. Absolute paths, so working-directory: .
      # (the job default is apps/yerd-gui). No-op on the Linux leg.
      - name: Set up macOS signing
        if: runner.os == 'macOS'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/signing.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KC"
          # Prepend the ephemeral keychain to the existing user search list,
          # reading each path space-safely. NB the macos-14 runner ships bash 3.2
          # (no `mapfile`), so use a while-read loop; guard the empty expansion
          # for `set -u`.
          EXISTING=()
          while IFS= read -r kc; do EXISTING+=("$kc"); done \
            < <(security list-keychains -d user | sed -e 's/^[[:space:]]*"//' -e 's/"[[:space:]]*$//')
          security list-keychains -d user -s "$KC" ${EXISTING[@]+"${EXISTING[@]}"}
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      # Tauri signs the bundle and notarises + staples the .app when these are set
      # (macOS); the .dmg is signed but not separately stapled — the stapled .app
      # inside gates correctly. APPLE_CERTIFICATE is deliberately NOT passed: the
      # cert is already in the keychain from the step above, and passing it would
      # make Tauri spin up its own keychain and conflict. Unset/ignored on Linux.
      # macOS only: build yerdd natively and stage it as the Tauri sidecar so
      # `bundle.externalBin` embeds it at Contents/MacOS/yerdd (signed by Tauri
      # as part of the bundle). Native build (no --target) shares the rust-cache
      # with the rest and matches the `cli` job; the triple-suffixed filename is
      # only Tauri's sidecar naming convention.
      # Build the embedded binaries (daemon + CLI + helper) natively and stage
      # them as Tauri externalBin sidecars (`name-<triple>`). Native build shares
      # the rust-cache; the triple suffix is only Tauri's sidecar naming.
      - name: Stage embedded binaries (externalBin)
        working-directory: .
        run: |
          set -euo pipefail
          cargo build --release -p yerd -p yerdd -p yerd-helper
          mkdir -p apps/yerd-gui/src-tauri/binaries
          if [ "$RUNNER_OS" = "macOS" ]; then triple=aarch64-apple-darwin; \
            else triple=x86_64-unknown-linux-gnu; fi
          for b in yerd yerdd yerd-helper; do
            cp "target/release/$b" "apps/yerd-gui/src-tauri/binaries/$b-$triple"
          done

      - name: Build Tauri bundles (signed + notarised on macOS)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        # Each platform applies its release overlay (externalBin + macOS plist /
        # Linux deb postinst). `--config` is resolved relative to the cwd
        # (apps/yerd-gui), so the path is src-tauri-relative.
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            npm run tauri build -- --config src-tauri/tauri.bundle-macos.conf.json
          else
            npm run tauri build -- --config src-tauri/tauri.bundle-linux.conf.json
          fi

      # Fail-closed: prove the .app is Developer-ID signed with Hardened Runtime,
      # stapled, and Gatekeeper-accepted. The launch test catches entitlement
      # gaps (they crash at runtime, not at notarisation).
      - name: Verify macOS signing
        if: runner.os == 'macOS'
        working-directory: .
        run: |
          set -euo pipefail
          # Search only dirs that exist — `find` over a missing path exits non-zero
          # and would abort the step under `set -euo pipefail`.
          ROOTS=()
          for d in target apps/yerd-gui/src-tauri/target; do [ -d "$d" ] && ROOTS+=("$d"); done
          [ "${#ROOTS[@]}" -gt 0 ] || { echo "::error::no build output dir found"; exit 1; }
          # `|| true`: with 2+ matches, head closes the pipe and find takes SIGPIPE,
          # which pipefail would otherwise turn into a step abort.
          APP=$(find "${ROOTS[@]}" -name 'Yerd.app' -type d 2>/dev/null | head -n1 || true)
          DMG=$(find "${ROOTS[@]}" -name '*.dmg' -type f 2>/dev/null | head -n1 || true)
          # Explicit fail-fast: under `set -e`, a failure on the LEFT of `&&` does
          # not abort, so `test -n "$APP" && test -n "$DMG"` would sail past an
          # empty APP into a cryptic codesign error. Check each separately.
          [ -n "$APP" ] || { echo "::error::Yerd.app not found under ${ROOTS[*]} (is \"app\" in tauri.conf.json bundle.targets?)"; exit 1; }
          [ -n "$DMG" ] || { echo "::error::no .dmg found under ${ROOTS[*]}"; exit 1; }
          echo "Verifying $APP and $DMG"
          codesign --verify --strict --verbose=2 "$APP"
          codesign -dv --verbose=4 "$APP" > /tmp/cs.txt 2>&1
          grep -q "Authority=Developer ID Application" /tmp/cs.txt
          grep -Eq "flags=.*runtime" /tmp/cs.txt
          xcrun stapler validate "$APP"                        # primary gate (the .app is stapled)
          # The .app is stapled, so this assesses offline and reliably.
          spctl -a -t exec -vvv "$APP"

          # ── Embedded binaries (daemon + CLI + helper) + SMAppService plist ──
          AGENT="$APP/Contents/Library/LaunchAgents/dev.yerd.daemon.plist"
          [ -f "$AGENT" ] || { echo "::error::missing embedded LaunchAgent $AGENT"; exit 1; }
          # The plist must be sealed into the bundle's code signature (not a late,
          # unsigned add). `codesign -dvvv` only prints a SUMMARY count of sealed
          # resources, never individual paths, so query the CodeResources plist
          # directly. Depending on the signing rules the entry lives under
          # `files2` (modern) or `files` (legacy) — accept either.
          CR="$APP/Contents/_CodeSignature/CodeResources"
          /usr/libexec/PlistBuddy -c 'Print :files2:Library/LaunchAgents/dev.yerd.daemon.plist' "$CR" >/dev/null 2>&1 \
            || /usr/libexec/PlistBuddy -c 'Print :files:Library/LaunchAgents/dev.yerd.daemon.plist' "$CR" >/dev/null 2>&1 \
            || { echo "::error::LaunchAgent plist is not sealed into the app signature"; exit 1; }
          APP_TEAM=$(sed -n 's/^TeamIdentifier=//p' /tmp/cs.txt)
          for b in yerd yerdd yerd-helper; do
            BIN="$APP/Contents/MacOS/$b"
            [ -f "$BIN" ] || { echo "::error::missing bundled binary $BIN"; exit 1; }
            # Developer-ID signed, Hardened Runtime, timestamped, same team as the
            # app (SMAppService trusts the daemon by matching Team ID).
            codesign --verify --strict --verbose=2 "$BIN"
            codesign -dv --verbose=4 "$BIN" > "/tmp/cs-$b.txt" 2>&1
            grep -q "Authority=Developer ID Application" "/tmp/cs-$b.txt"
            grep -Eq "flags=.*runtime" "/tmp/cs-$b.txt"
            grep -q "Timestamp=" "/tmp/cs-$b.txt" || { echo "::error::$b has no secure timestamp"; exit 1; }
            team=$(sed -n 's/^TeamIdentifier=//p' "/tmp/cs-$b.txt")
            [ -n "$APP_TEAM" ] && [ "$APP_TEAM" = "$team" ] \
              || { echo "::error::$b TeamIdentifier '$team' != app '$APP_TEAM'"; exit 1; }
            # B5: must NOT inherit the webview's Hardened-Runtime exceptions
            # (allow-jit / unsigned-exec-mem) or get-task-allow. If this fails,
            # apply the sidecar re-sign remediation (see the plan, gate B5).
            ENT=$(codesign -d --entitlements - --xml "$BIN" 2>/dev/null || true)
            for bad in com.apple.security.cs.allow-jit \
                       com.apple.security.cs.allow-unsigned-executable-memory \
                       com.apple.security.get-task-allow; do
              if printf '%s' "$ENT" | grep -q "$bad"; then
                echo "::error::$b carries entitlement $bad (Hardened-Runtime regression)"; exit 1
              fi
            done
            # Exec smoke: an AMFI/HR kill is signal 9 (exit >=128); a normal
            # non-zero exit (bad args / helper refusing non-root) is fine.
            code=0; "$BIN" --version >/dev/null 2>&1 || code=$?
            [ "$code" -lt 128 ] \
              || { echo "::error::$b was killed (exit $code) — signing/Hardened-Runtime failure"; exit 1; }
          done
          echo "Embedded binaries + LaunchAgent: present, sealed, Developer-ID, team-matched, entitlement-clean, exec OK"

          # The .dmg is signed but not stapled; its assessment needs an online
          # notary lookup that can flake on CI — keep it advisory.
          xcrun stapler validate "$DMG" || echo "::warning::dmg not stapled (expected; .app is the gate)"
          spctl -a -t open --context context:primary-signature -vvv "$DMG" \
            || echo "::warning::dmg spctl assessment non-fatal (online check may flake)"
          # Prove the SHIPPED dmg (not just the loose build-dir .app) carries the
          # embedded daemon + agent plist — guards against a stale .app in the dmg.
          MP=$(mktemp -d)
          hdiutil attach -nobrowse -quiet -mountpoint "$MP" "$DMG"
          DMG_APP=$(find "$MP" -maxdepth 1 -name 'Yerd.app' -type d | head -n1)
          miss=""
          for b in yerd yerdd yerd-helper; do
            [ -f "$DMG_APP/Contents/MacOS/$b" ] || miss="$miss $b"
          done
          [ -f "$DMG_APP/Contents/Library/LaunchAgents/dev.yerd.daemon.plist" ] || miss="$miss plist"
          if [ -n "$miss" ]; then
            echo "::error::shipped DMG is missing:$miss"
            hdiutil detach -quiet "$MP" || true; exit 1
          fi
          hdiutil detach -quiet "$MP" || true
          echo "Shipped DMG carries the embedded binaries + LaunchAgent — OK"
          # Launch test: a Hardened-Runtime/AMFI kill is SIGKILL (exit 137) and may
          # leave nothing in the app's own log, so also check the exit signal and
          # the system log. A clean early exit (single-instance/no-daemon/headless)
          # is tolerated; the human prerelease check is definitive.
          # The bundle's main binary is the Cargo bin name (`yerd-gui`), NOT the
          # productName ("Yerd"), so resolve it from Info.plist rather than
          # hardcoding — a hardcoded `Yerd` would be "No such file or directory"
          # and the test would pass vacuously. YERD_NO_AUTO_DAEMON disables the
          # SMAppService path so this headless launch makes no register()/status()
          # call (which could otherwise pollute the signing-failure grep below).
          EXE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Contents/Info.plist")
          YERD_NO_AUTO_DAEMON=1 "$APP/Contents/MacOS/$EXE" >/tmp/app.log 2>&1 & PID=$!
          sleep 8
          if kill -0 "$PID" 2>/dev/null; then
            echo "App stayed up — entitlements OK"; kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true
          else
            # `|| code=$?`: `wait` returns the child's non-zero status, which would
            # abort under `set -e` before we could classify it.
            code=0; wait "$PID" || code=$?
            if [ "$code" -ge 128 ] \
               || grep -Eiq "code signature|library not loaded|amfi|invalid signature" /tmp/app.log \
               || log show --last 3m --predicate "process == \"$EXE\"" 2>/dev/null | grep -Eiq "AMFI|code signature|killed"; then
              echo "::error::App was killed/crashed (exit $code) — likely signing/entitlement failure:"; cat /tmp/app.log; exit 1
            fi
            echo "::warning::App exited early (exit $code) with no signing error — likely headless/single-instance:"; cat /tmp/app.log
          fi

      # Self-update artifact: a gzip'd tar of the signed+stapled .app that the
      # in-app/`yerd update` applier swaps into /Applications. Apple-Silicon only
      # (the build matrix produces no Intel .app). The mandatory gate below
      # extracts into a FRESH dir and re-asserts codesign + staple + OFFLINE
      # Gatekeeper assessment + a Team ID, proving the notarization survives the
      # tar round-trip. If a future macOS drops the staple through tar, switch the
      # packaging to `ditto`/zip — the gate will catch it before publish.
      - name: Package + verify macOS .app.tar.gz updater artifact
        if: runner.os == 'macOS'
        working-directory: .
        run: |
          set -euo pipefail
          ROOTS=()
          for d in target apps/yerd-gui/src-tauri/target; do [ -d "$d" ] && ROOTS+=("$d"); done
          APP=$(find "${ROOTS[@]}" -name 'Yerd.app' -type d 2>/dev/null | head -n1 || true)
          [ -n "$APP" ] || { echo "::error::Yerd.app not found for tarball packaging"; exit 1; }
          OUT_DIR="apps/yerd-gui/src-tauri/target/release/bundle/updater"
          mkdir -p "$OUT_DIR"
          # Apple-Silicon only; the publish job appends the version to this name.
          OUT="$OUT_DIR/Yerd_MacOS_AppleSilicon.app.tar.gz"
          # bsdtar (macOS /usr/bin/tar) preserving permissions; the applier extracts
          # with the same bsdtar via `tar -xpf`.
          ( cd "$(dirname "$APP")" && /usr/bin/tar -czpf - "$(basename "$APP")" ) > "$OUT"
          # ── Gate: fresh extract + offline re-verification ──
          TMP=$(mktemp -d)
          /usr/bin/tar -xpf "$OUT" -C "$TMP"
          EXAPP="$TMP/$(basename "$APP")"
          codesign --verify --deep --strict --verbose=2 "$EXAPP"
          xcrun stapler validate "$EXAPP"                        # notarization survived the tar
          spctl -a -t exec -vvv "$EXAPP"                         # offline Gatekeeper accept
          codesign -dv --verbose=4 "$EXAPP" 2>&1 | grep -q 'TeamIdentifier=' \
            || { echo "::error::extracted .app has no Team ID"; exit 1; }
          rm -rf "$TMP"
          echo "Packaged + verified $OUT"

      # The GUI .deb must EMBED the three binaries (daemon + CLI + helper) and the
      # postinst that co-locates them on PATH + setcaps yerdd. (SPIKE-L1: confirm
      # the exact embedded dir + the symlink/setcap chain on a real Linux box; the
      # binaries land under /usr/lib/<product>/, not /usr/bin.)
      - name: Assert Linux GUI bundle embeds the binaries + postinst
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          set -euo pipefail
          shopt -s nullglob
          debs=(target/release/bundle/deb/*.deb \
                apps/yerd-gui/src-tauri/target/release/bundle/deb/*.deb)
          [ "${#debs[@]}" -gt 0 ] || { echo "::error::no GUI .deb produced"; exit 1; }
          for deb in "${debs[@]}"; do
            list=$(dpkg-deb -c "$deb")
            for b in yerd yerdd yerd-helper; do
              printf '%s\n' "$list" | grep -Eq "/$b\$" \
                || { echo "::error::GUI .deb ($deb) is missing embedded $b"; exit 1; }
            done
            dpkg-deb -e "$deb" /tmp/ctrl-$$ 2>/dev/null || true
            [ -f "/tmp/ctrl-$$/postinst" ] \
              || { echo "::error::GUI .deb ($deb) has no postinst (setcap/symlink)"; exit 1; }
            rm -rf "/tmp/ctrl-$$"
          done
          echo "Linux GUI .deb embeds yerd/yerdd/yerd-helper + postinst — OK"

      # Tauri writes bundles under the workspace target dir; glob both possible
      # locations so a path tweak upstream doesn't silently drop artifacts.
      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.os }}
          if-no-files-found: error
          path: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.dmg
            apps/yerd-gui/src-tauri/target/release/bundle/**/*.deb
            apps/yerd-gui/src-tauri/target/release/bundle/**/*.dmg
            apps/yerd-gui/src-tauri/target/release/bundle/updater/*.app.tar.gz

  # The ONLY job that touches the release. Assemble everything, create it as a
  # hidden draft with all files + checksums attached, then flip it public —
  # so nobody can ever see a release missing its artifacts.
  publish:
    name: publish
    needs: [gui]
    runs-on: ubuntu-22.04
    # Checkout is needed so the trust-anchor gate can read the embedded
    # UPDATE_PUBLIC_KEY from source at the tagged commit. GH_REPO is kept explicit
    # for gh (harmless once a checkout is present).
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      # Read-only checkout (the trust-anchor gate just reads source); no later
      # step does any git operation and release auth is GH_TOKEN, so don't leave
      # the checkout token persisted in .git/config.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # upload-artifact preserves each file's source path, so the GUI bundles
      # (target/release/bundle/) arrive nested. Flatten to the dist root so
      # `dist/*` and the maxdepth-1 SHA256SUMS find catch them all.
      - name: Flatten + rename downloaded artifacts
        working-directory: dist
        run: |
          set -euo pipefail
          find . -mindepth 2 -type f \
            \( -name '*.deb' -o -name '*.dmg' -o -name '*.app.tar.gz' \) -exec mv -t . {} +
          # Drop the now-redundant nested dirs so `dist/*` is files-only.
          find . -mindepth 1 -type d -exec rm -rf {} +
          # Human-friendly release asset names:
          #   Yerd_<OS>_<Arch>_v<version>.<ext>   (e.g. Yerd_MacOS_AppleSilicon_v2-0-2-rc-3.dmg)
          # Tauri emits Yerd_<ver>_<arch>.{dmg,deb}; the .app.tar.gz is already
          # Yerd_MacOS_AppleSilicon.app.tar.gz. We relabel OS+arch and dash the
          # version (dots → dashes) so the Releases page reads cleanly.
          ver="v$(printf '%s' "${GITHUB_REF_NAME#v}" | tr '.' '-')"
          for f in Yerd_* yerd-gui_* yerd_*; do
            [ -e "$f" ] || continue
            # Compound extension first (`.app.tar.gz` would otherwise become `gz`).
            case "$f" in
              *.app.tar.gz) ext="app.tar.gz"; os="MacOS" ;;
              *.dmg)        ext="dmg";        os="MacOS" ;;
              *.deb)        ext="deb";        os="Linux" ;;
              *) continue ;;
            esac
            case "$f" in
              *AppleSilicon*|*aarch64*|*arm64*) [ "$os" = "MacOS" ] && arch="AppleSilicon" || arch="Arm64" ;;
              *x86_64*|*amd64*)  arch="x86_64" ;;
              *) arch="unknown" ;;
            esac
            mv -- "$f" "Yerd_${os}_${arch}_${ver}.${ext}"
          done
          echo "Release artifacts:" && ls -1

      # Detached minisign signatures over the final-named update artifacts, which
      # the daemon verifies before applying (against the key embedded in
      # `yerd_update::UPDATE_PUBLIC_KEY`). `-H` = prehashed, which `minisign-verify`
      # requires. PRECONDITION: provision `MINISIGN_SECRET_KEY` (generate an
      # *unencrypted* key with `minisign -G -W` to avoid a CI password prompt) and
      # set `UPDATE_PUBLIC_KEY` to its public half before this is load-bearing.
      - name: Sign update artifacts (minisign)
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — cannot sign the release"
            exit 1
          fi
          # `minisign` isn't in the runner's apt repos, so install the official
          # prebuilt static binary from the canonical (pinned) release over HTTPS.
          MINISIGN_VERSION=0.11
          curl -sSfL "https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          MINISIGN_BIN=$(find "$RUNNER_TEMP/minisign-linux" -path '*x86_64*' -name minisign | head -n1)
          [ -n "$MINISIGN_BIN" ] || { echo "::error::minisign x86_64 binary not found in release tarball"; exit 1; }
          sudo install -m0755 "$MINISIGN_BIN" /usr/local/bin/minisign
          command -v minisign
          # Wipe the key on ANY exit (incl. a mid-loop failure), not just success.
          trap 'rm -f "$RUNNER_TEMP/minisign.key"' EXIT
          umask 077; printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          shopt -s nullglob
          for f in *.app.tar.gz *.deb; do
            minisign -S -H -s "$RUNNER_TEMP/minisign.key" -m "$f" -x "$f.sig"
            echo "signed $f -> $f.sig"
          done

      # Trust-anchor gate: prove the public key the daemon EMBEDS
      # (`yerd_update::UPDATE_PUBLIC_KEY`) actually verifies these signatures — so
      # a real release can never ship signatures the shipped binary can't check
      # (catches both the placeholder key being left in and a CI secret mismatch).
      - name: Verify signatures against the embedded public key
        working-directory: dist
        run: |
          set -euo pipefail
          ART="$GITHUB_WORKSPACE/crates/yerd-update/src/artifact.rs"
          KEY=$(grep -oE 'UPDATE_PUBLIC_KEY: &str = "[^"]+"' "$ART" | sed -E 's/.*"([^"]+)".*/\1/')
          [ -n "$KEY" ] || { echo "::error::could not read UPDATE_PUBLIC_KEY from $ART"; exit 1; }
          # Refuse to ship the published minisign-verify test key.
          TEST_KEY="RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3"
          if [ "$KEY" = "$TEST_KEY" ]; then
            echo "::error::UPDATE_PUBLIC_KEY is still the placeholder test key — wire the production key before releasing"
            exit 1
          fi
          shopt -s nullglob
          for f in *.app.tar.gz *.deb; do
            minisign -V -H -P "$KEY" -m "$f" -x "$f.sig" \
              || { echo "::error::embedded UPDATE_PUBLIC_KEY does not verify $f.sig (key/secret mismatch)"; exit 1; }
            echo "verified $f against embedded key"
          done

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          find . -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.dmg' -o -name '*.app.tar.gz' \) \
            -printf '%P\n' | sort | xargs -r sha256sum > SHA256SUMS
          echo "Artifacts:" && cat SHA256SUMS

      - name: Create draft release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: dist/*

      - name: Publish (flip draft -> public)
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          fi
