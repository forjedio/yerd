name: Install Linux GUI build deps
description: >
  Install (and cache) the GTK/WebKit/etc. -dev packages the Tauri GUI crate
  links, so `cargo build/clippy/test --workspace` works on Linux. Cached with
  cache-apt-pkgs-action so repeat runs restore the .debs in seconds instead of
  waiting on the x86 apt lock; `version` is arch-scoped so the x86 and arm64
  legs never share a cache entry. Requires the repo to be checked out first.
runs:
  using: composite
  steps:
    - uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev libdbus-1-dev libxdo-dev librsvg2-dev
        version: gui-${{ runner.arch }}
