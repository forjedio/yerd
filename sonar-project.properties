# SonarQube configuration for Yerd.
#
# sonar.projectKey and the server URL/token are NOT stored here — they are
# injected from CI secrets by .github/workflows/sonarqube.yml
# (SONAR_PROJECT_KEY / SONAR_HOST_URL / SONAR_TOKEN).

sonar.projectName=yerd
sonar.sourceEncoding=UTF-8

# Analyse the whole repo; the language analysers pick up Rust, TS/JS, etc.
sonar.sources=.

# Keep build output, vendored deps, and generated files out of analysis.
sonar.exclusions=\
  **/target/**,\
  **/node_modules/**,\
  **/dist/**,\
  apps/yerd-gui/src-tauri/gen/**,\
  docs/.vitepress/cache/**,\
  docs/.vitepress/dist/**

# Rust coverage, produced by `cargo llvm-cov` in the workflow.
sonar.rust.lcov.reportPaths=lcov.info
