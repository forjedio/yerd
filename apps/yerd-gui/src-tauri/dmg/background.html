<!DOCTYPE html>
<!--
  Yerd DMG installer background — source for background.png / background@2x.png.

  This is a browser-rendered source (not the SVG+rsvg-convert pipeline the
  README used to describe) because the wordmarks use Forjed's "Outage Cut"
  brand display face, which librsvg can't resolve without it being installed
  as a system font. A real browser loads the @font-face below directly.

  The Yerd.app and Applications icons are placed on top by `appdmg` (headless,
  no Finder/AppleScript — see ../scripts/build-macos-dmg.sh), at the positions
  configured in ./appdmg.json (contents[].x/y): this art is everything else.
  Keep this file's 660x420 canvas and the arrow's position in sync with
  appdmg.json's window.size and icon x/y — there is no single technical
  source of truth for that geometry, just this comment. See README.md for how
  to regenerate the PNGs.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Yerd DMG Background</title>
<style>
@font-face {
  font-family: 'Outage Cut';
  src: url('../../src/assets/fonts/OutageCut.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; }
.canvas {
  position: relative;
  width: 660px;
  height: 420px;
  background: #1c1c1c;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  zoom: 2; /* render at 2x; downsample 50% for the @1x PNG, see README.md */
}
.glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 520px 260px at 50% -8%, rgba(99,102,241,0.11), transparent 62%),
              radial-gradient(ellipse 420px 220px at 105% 112%, rgba(99,102,241,0.07), transparent 60%);
  pointer-events: none;
}
.wordmark-row { position: absolute; top: 46px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 11px; }
.brand-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: linear-gradient(135deg, #6366F1, #4338CA);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(79,70,229,0.35);
}
.wordmark { font-family: 'Outage Cut', sans-serif; font-weight: normal; font-size: 31px; letter-spacing: 1.5px; color: #f5f5f5; position: relative; top: 3px; }

/* Sized/positioned to sit in the 170px gap between the two icon-cards
   (245px-415px, see .icon-card) with a 15px margin on each side, so it never
   overlaps either card. */
.arrow { position: absolute; left: 260px; top: 191px; }

.caption { position: absolute; left: 0; right: 0; top: 336px; text-align: center; font-size: 15px; color: #a3a3a3; }

.footer-credit { position: absolute; left: 0; right: 0; top: 373px; text-align: center; font-size: 11px; color: #5f5f5f; letter-spacing: 0.2px; }
.footer-credit .fj { font-family: 'Outage Cut', sans-serif; font-weight: normal; color: #9497f8; font-size: 12.5px; letter-spacing: 0.6px; position: relative; top: 1px; margin-left: 2px; }

/* Finder always renders the Yerd.app/Applications item-name labels in black
   (this is not configurable via appdmg or any .DS_Store key — confirmed, it's
   a hard Finder limitation for picture-background windows), so a plain black
   label sits unreadably on this dark canvas. A white card behind each
   icon+label (icon top at content-relative y=157, label measured empirically
   at y≈274-284, for icon-size 96 centred at y=205) fixes that and reads as a
   deliberate tile rather than a patch. */
.icon-card {
  position: absolute; top: 145px; width: 140px; height: 155px;
  transform: translateX(-50%);
  background: #fbfbfb;
  border-radius: 24px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.4);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>
  <div class="icon-card" style="left: 175px;"></div>
  <div class="icon-card" style="left: 485px;"></div>

  <div class="wordmark-row">
    <div class="brand-icon">
      <svg viewBox="0 0 36 36" width="36" height="36" fill="none"><path d="M11 10.5 L18 19.5 L25 10.5 M18 19.5 L18 27" stroke="#fff" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="wordmark">YERD</div>
  </div>

  <svg class="arrow" width="140" height="36" viewBox="0 0 140 36" fill="none">
    <line x1="4" y1="18" x2="104" y2="18" stroke="#6366F1" stroke-width="9" stroke-linecap="round"/>
    <path d="M100 2 L136 18 L100 34 Z" fill="#6366F1"/>
  </svg>

  <div class="caption">Drag Yerd into the Applications folder</div>

  <div class="footer-credit">Created by <span class="fj">FORJED</span></div>
</div>
</body>
</html>
