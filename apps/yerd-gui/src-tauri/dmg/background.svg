<svg width="660" height="420" viewBox="0 0 660 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Yerd DMG installer background. The Finder draws the Yerd.app icon at
       appPosition (~x175,y200) and the Applications folder at
       applicationFolderPosition (~x485,y200); this art is everything else:
       the dark surface, title, the drag arrow between the two icons, and the
       caption. Regenerate the PNGs from this file (see README.md). -->
  <defs>
    <linearGradient id="yerd-bg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Charcoal surface (matches the app's dark background, hsl(0 0% 11%)). -->
  <rect width="660" height="420" fill="#1c1c1c"/>

  <!-- Title + brand mark, top-centre. -->
  <g transform="translate(296,40)">
    <rect width="36" height="36" rx="9" fill="url(#yerd-bg)"/>
    <path d="M11 10.5 L18 19.5 L25 10.5 M18 19.5 L18 27"
          stroke="#ffffff" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="330" y="106" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="600" fill="#f5f5f5">Install Yerd</text>

  <!-- Drag arrow, between the two icon columns (centred on y=200). -->
  <g stroke="#6366F1" stroke-width="9" stroke-linecap="round" fill="#6366F1">
    <line x1="250" y1="200" x2="398" y2="200"/>
    <path d="M396 182 L426 200 L396 218 Z" stroke-linejoin="round"/>
  </g>

  <!-- Caption, bottom-centre. -->
  <text x="330" y="356" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="400" fill="#a3a3a3">Drag Yerd into the Applications folder</text>
</svg>
