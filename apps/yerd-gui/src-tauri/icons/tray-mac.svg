<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yerd">
  <title>Yerd</title>
  <!-- macOS menu-bar template: rounded squircle with Y cut out. The squircle
       fills the canvas; only the Y mark is inset so it has breathing room inside
       the shape. Rasterised @4x in build.rs. -->
  <defs>
    <mask id="yerd-y-cutout" maskUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="white"/>
      <g transform="translate(11 11) scale(0.076) translate(-128 -132)">
        <path
          d="M82 76 L128 140 L174 76 M128 140 L128 188"
          fill="none"
          stroke="black"
          stroke-width="34"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </g>
    </mask>
  </defs>
  <rect
    x="2.15"
    y="2.15"
    width="17.7"
    height="17.7"
    rx="4.15"
    fill="#000000"
    mask="url(#yerd-y-cutout)"
  />
</svg>
