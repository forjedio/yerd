[package]
name                   = "yerdd"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
publish.workspace      = true
description            = "Yerd unprivileged daemon — wires every Phase-1 library together."

[features]
# Build the daemon for the Arch package: flips `yerd_update::PkgFormat::current()`
# to `Pacman` so self-update selects the `.pkg.tar.zst` and installs via `pacman -U`.
# Enabled ONLY by the Arch CI build (`--features yerdd/pacman`); default off → `.deb`.
pacman = ["yerd-update/pacman"]
# Build the daemon for the Fedora package: flips `PkgFormat::current()` to `Rpm` so
# self-update selects the `.rpm` and installs via `rpm -U`. Enabled ONLY by the
# Fedora CI build (`--features yerdd/rpm`); mutually exclusive with `pacman`.
rpm = ["yerd-update/rpm"]

[[bin]]
name = "yerdd"
path = "src/main.rs"

[lib]
name = "yerdd"
path = "src/lib.rs"

[dependencies]
yerd-core      = { path = "../../crates/yerd-core" }
yerd-config    = { path = "../../crates/yerd-config" }
yerd-ipc       = { path = "../../crates/yerd-ipc", features = ["transport"] }
yerd-tls       = { path = "../../crates/yerd-tls" }
yerd-platform  = { path = "../../crates/yerd-platform" }
yerd-dns       = { path = "../../crates/yerd-dns" }
yerd-php       = { path = "../../crates/yerd-php" }
yerd-services  = { path = "../../crates/yerd-services" }
yerd-supervise = { path = "../../crates/yerd-supervise" }
yerd-tunnel    = { path = "../../crates/yerd-tunnel" }
yerd-proxy     = { path = "../../crates/yerd-proxy" }
yerd-doctor    = { path = "../../crates/yerd-doctor" }
yerd-mail      = { path = "../../crates/yerd-mail" }
yerd-update    = { path = "../../crates/yerd-update" }
thiserror      = { workspace = true }
semver         = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
sha2           = { workspace = true }
hex            = { workspace = true }
rand           = { workspace = true }
async-trait    = { workspace = true }
clap           = { workspace = true }
tokio          = { workspace = true, features = ["net", "rt-multi-thread", "macros", "signal", "time", "io-util", "sync", "process"] }
tracing        = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
interprocess   = { workspace = true }
fs4            = { workspace = true }
rustls         = { workspace = true, features = ["ring"] }
rustls-pki-types = { workspace = true, features = ["alloc", "std"] }
time           = { workspace = true }
# PHP install path: fetch (rustls, no OpenSSL) + unpack prebuilt builds.
reqwest        = { workspace = true }
flate2         = { workspace = true }
tar            = { workspace = true }
# Bun ships only a .zip. `deflate` selects flate2's pure-Rust `rust_backend`
# (miniz_oxide) and also pulls `zopfli` (a compressor we don't use); both are
# pure-Rust so there are no bzip2/zstd/lzma C deps. A decompress-only path that
# drops zopfli isn't available without switching to a C zlib backend, so we keep
# `deflate`. Version pinned to 2.x in the workspace (zip >= 4 needs
# edition2024/MSRV 1.88; see the workspace Cargo.toml pin block).
zip            = { workspace = true, features = ["deflate"] }
notify-debouncer-mini = "0.4"

# Site creation streams `laravel new` output and process-group-kills it on
# cancel/timeout (Unix); `killpg` lives in `nix`.
[target.'cfg(unix)'.dependencies]
# `user` adds `User::from_uid`/`getuid` — resolve the invoking user's login shell
# when `$SHELL` is absent (launchd/systemd service env) for external-tool detection.
nix            = { workspace = true, features = ["user"] }

[dev-dependencies]
tempfile       = { workspace = true }
minisign       = { workspace = true }
tokio          = { workspace = true, features = ["macros", "rt-multi-thread", "net", "io-util", "sync", "time"] }
yerd-depcheck  = { path = "../../crates/yerd-depcheck" }

[lints]
workspace = true
