[package]
name                   = "yerd-helper"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
publish.workspace      = true
description            = "Privileged one-shot for Yerd: CA install, resolver install, setcap."
readme                 = "README.md"

[[bin]]
name = "yerd-helper"
path = "src/main.rs"

[dependencies]
yerd-core     = { path = "../../crates/yerd-core" }
yerd-platform = { path = "../../crates/yerd-platform" }
clap          = { workspace = true }
thiserror     = { workspace = true }
hex           = { workspace = true }
pem           = { workspace = true }

[dev-dependencies]
tempfile   = { workspace = true }
serde_json = { workspace = true }
# Test-only: mint CAs (and the Validity timestamps they need) to exercise the
# yerd-ownership guard. Not a runtime dep — keeps rcgen/ring out of the
# privileged binary.
yerd-tls   = { path = "../../crates/yerd-tls" }
time       = { workspace = true }

[lints]
workspace = true
