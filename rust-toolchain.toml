[toolchain]
# Bumped from 1.77.0: current Tauri v2 (tauri-utils / plugins) depends on
# toml 1.x / serde_spanned 1.x, which require edition2024 → rustc ≥ 1.85. The
# GUI (apps/yerd-gui) cannot build on 1.77. The pure library crates still target
# the 1.77 MSRV claimed in their manifests; this is the build/dev toolchain.
channel = "1.96.0"
components = ["clippy", "rustfmt"]
